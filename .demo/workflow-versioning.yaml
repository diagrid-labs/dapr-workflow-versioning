title: Workflow Versioning
description: ''
version: 3
scenes:
  - id: demo-mnropc6e-0vf6
    title: Show Aspire projects
    moves:
      - action: executeVSCodeCommand
        command: workbench.view.explorer
  - id: scene-mnrqasb2-sver
    title: Show AppHost
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.AppHost/AppHost.cs
  - id: scene-mnrqza12-wz9z
    title: Show workflow diagram
    moves:
      - action: markdownPreview
        path: .demo/slides/diagnostics-workflow-v0.md
  - id: scene-mnrol4o8-zic7
    title: Show workflow
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Workflows/DiagnosticsWorkflow.cs
  - id: demo-mnromf7p-rq2z
    title: Show activity
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Activities/AnalyzeHullActivity.cs
  - id: demo-mnron4pu-wd99
    title: Show Program.cs
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Program.cs
  - id: scene-mnqzvwx1-dkk1
    title: Build application
    moves:
      - action: executeTerminalCommand
        command: cd EnterpriseDiagnostics
        terminalId: app-run
        insertTypingMode: instant
        autoExecute: true
      - action: executeTerminalCommand
        command: dotnet build
        terminalId: app-run
        insertTypingMode: instant
        autoExecute: true
  - id: scene-mnqzz7qb-zhxr
    title: Run initial workflow
    moves:
      - action: executeTerminalCommand
        command: aspire run
        terminalId: app-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 100
      - action: showInfoMessage
        message: Open Aspire Dashboard & Diagrid Dev Dashboard
  - id: scene-mnr036vl-9amu
    title: Start workflow
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/EnterpriseDiagnostics.ApiService.http
  - id: scene-mnr9tzqq-bfvk
    title: Check Workflow Dashboard
    moves:
      - action: showInfoMessage
        message: Check Diagrid Dev Dashboard
  - id: scene-mnrbvk1w-jr1h
    title: Stop application
    moves:
      - action: focusTerminal
        terminalId: app-run
      - action: sendKeybinding
        keybinding: ctrl+c
  - id: scene-mnrbg470-b5tt
    title: Open workflow file
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Workflows/DiagnosticsWorkflow.cs
  - id: scene-mnr9uzk3-567g
    title: Add activity to workflow
    moves:
      - action: replace
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Workflows/DiagnosticsWorkflow.cs
        contentPath: .demo/inserts/01-add-activity.txt
        position: '30:36'
        highlightWholeLine: true
        insertTypingMode: line-by-line
  - id: scene-mnrc0g7q-lo5c
    title: Open Program.cs
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Program.cs
  - id: demo-mnrbub59-9rfm
    title: Add activity registration
    moves:
      - action: insert
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Program.cs
        contentPath: .demo/inserts/02-add-activity.txt
        position: '20'
        insertTypingMode: instant
        highlightWholeLine: true
  - id: demo-mnrbmsxe-udag
    title: Run patched workflow
    moves:
      - action: executeTerminalCommand
        command: aspire run
        terminalId: app-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 100
  - id: scene-mnrbxdox-ksu1
    title: Start patched workflow
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/EnterpriseDiagnostics.ApiService.http
  - id: scene-mnrnhqbw-iqlg
    title: Stop patched application
    moves:
      - action: focusTerminal
        terminalId: app-run
      - action: sendKeybinding
        keybinding: ctrl+c
  - id: demo-mnrr0suf-qlct
    title: Show workflow v2 diagram
    moves:
      - action: markdownPreview
        path: .demo/slides/diagnostics-workflow-v2.md
  - id: scene-mnro3may-44t4
    title: Workflow V2
    moves:
      - action: rename
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Workflows/DiagnosticsWorkflowV2.cs.temp
        dest: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Workflows/DiagnosticsWorkflowV2.cs
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/Workflows/DiagnosticsWorkflowV2.cs
  - id: demo-mnro68t7-3bk9
    title: Run V2 workflow
    moves:
      - action: executeTerminalCommand
        command: aspire run
        terminalId: app-run
        insertTypingMode: character-by-character
        insertTypingSpeed: 100
  - id: demo-mnro8r8o-8lky
    title: Start V2 workflow
    moves:
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.ApiService/EnterpriseDiagnostics.ApiService.http
