    title: Update AppHost dependencies
    moves:
      - action: executeTerminalCommand
        terminalId: app-run
        command: dotnet add EnterpriseDiagnostics.AppHost/EnterpriseDiagnostics.AppHost.csproj package Diagrid.Aspire.Hosting.Catalyst
        insertTypingMode: instant
        autoExecute: true
      - action: executeTerminalCommand
        terminalId: app-run
        command: dotnet remove EnterpriseDiagnostics.AppHost/EnterpriseDiagnostics.AppHost.csproj package Aspire.Hosting.Valkey
        insertTypingMode: instant
        autoExecute: true
      - action: executeTerminalCommand
        terminalId: app-run
        command: dotnet remove EnterpriseDiagnostics.AppHost/EnterpriseDiagnostics.AppHost.csproj package CommunityToolkit.Aspire.Hosting.Dapr
        insertTypingMode: instant
        autoExecute: true
  - id: scene-mnsnz84q-3lj7
    title: Update AppHost.cs
    moves:
      - action: rename
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.AppHost/AppHost.cs
        dest: EnterpriseDiagnostics/EnterpriseDiagnostics.AppHost/AppHost.cs.orig
      - action: waitForTimeout
        timeout: 500
      - action: rename
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.AppHost/AppHost.cs.temp
        dest: EnterpriseDiagnostics/EnterpriseDiagnostics.AppHost/AppHost.cs
      - action: waitForTimeout
        timeout: 500
      - action: open
        path: EnterpriseDiagnostics/EnterpriseDiagnostics.AppHost/AppHost.cs
